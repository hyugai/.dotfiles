format = """
$username@$hostname $directory$git_branch$git_status$status
$character
"""

[username]
show_always = true

[hostname]
ssh_only = false

[directory]
style = "bold blue"
truncation_length = 3

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold red"
format = " [$all_status$ahead_behind]"

[status]
disabled = false
style = "bold red"
format = " [$status]"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
